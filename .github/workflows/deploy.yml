name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js (for TypeScript)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies and Compile TS
        run: |
          npm install -g typescript
          tsc -p ./src/

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Build and Publish
        run: |
          dotnet publish -c Release -r linux-x64 --self-contained false -o ./publish

      - name: Deploy to Server via RSYNC
        uses: Burnett01/rsync-deployments@v8
        with:
          switches: -avzr --delete
          path: ./publish/
          remote_path: /home/DataBankDialer/prod/
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: DataBankDialer
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Restart Systemd Service
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: DataBankDialer
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: sudo systemctl restart databank-dialer.service
